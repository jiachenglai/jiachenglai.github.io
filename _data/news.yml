title: News & Opportunities

opportunity:
  lead: I am currently a Research Intern at <a href="https://suat-sz.edu.cn/en/">Shenzhen University of Advanced Technology (SUAT)</a>, advised by <a href="https://csce.suat-sz.edu.cn/info/1011/1273.htm">Prof. Hui Peng</a>. <span class="opportunity-highlight">I remain open to future research opportunities, including fully funded Ph.D. programs, research-oriented Master's programs, and Research Assistant positions.</span>
  intro: "My research focuses on reliable and calibrated machine learning for computational biology and drug discovery, especially:"
  focus:
    - title: Heterogeneous biomedical data integration
      text: learning from molecular structures, protein sequences, microbial genomic signals, biological networks, drug-response profiles, and multi-omics measurements.
    - title: Reliable low-data prediction
      text: building calibrated models for noisy, incomplete, and label-scarce biomedical data, with interest in uncertainty quantification and robust evaluation.
    - title: Drug discovery and bioinformatics applications
      text: studying microbe-drug association prediction, cold-start drug-microbe learning, drug-Mtb affinity prediction, and anti-tuberculosis drug repurposing.
  closing: If you are interested in mathematical, statistical, or machine learning approaches to computational biology and drug discovery, please feel free to contact me.

