bio:
  - >-
    I am a B.S. student in Mathematics and Applied Mathematics at Changsha University and currently
    a Research Intern at Shenzhen University of Advanced Technology, advised by Hui Peng. Before
    joining SUAT, I worked as an Undergraduate Research Assistant at the Bioinformatics Complex
    Network Big Data Research Institute, Changsha University, advised by
    <a href="https://jsxy.ccsu.cn/info/1201/20094.htm">Prof. Lei Wang</a>.
  - >-
    My research focuses on reliable and calibrated machine learning for computational biology and
    drug discovery. I am interested in heterogeneous biomedical data integration across molecular
    structures, protein sequences, microbial genomic signals, biological networks, drug-response
    profiles, and multi-omics measurements.
  - >-
    My previous work includes heterogeneous graph-based microbe-drug association prediction,
    feature-independent cold-start drug-microbe association learning, and multimodal drug-Mtb
    affinity prediction for anti-tuberculosis drug repurposing.

